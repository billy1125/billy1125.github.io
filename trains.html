<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="呂卓勳 Cho-Hsun Lu" />
    <title>車次資料瀏覽器 | 台灣鐵路/軌道運行圖</title>
    <meta name="description" content="瀏覽台灣鐵路各車次時刻資料，支援依日期與車次查詢詳細停靠站時刻。" />
    <meta name="keywords" content="台鐵,車次查詢,時刻表,TRA,列車資料" />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://tradiagram.com/trains.html" />
    <meta property="og:title" content="車次資料瀏覽器 | 台灣鐵路/軌道運行圖" />
    <meta property="og:description" content="瀏覽台灣鐵路各車次時刻資料，支援依日期與車次查詢詳細停靠站時刻。" />
    <meta property="og:image" content="https://tradiagram.com/images/og-cover.png" />
    <meta property="og:url" content="https://tradiagram.com/trains.html" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_TW" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="stylesheet" href="css/trains.css" />
</head>

<body>

    <header>
        <h1><span class="title-full">目前所有可讀取的台鐵時刻資料 </span>TRA JSON Parser</h1>
        <span class="subtitle" id="status"><span class="loading-dots">載入中</span></span>
    </header>

    <div class="workspace">

        <!-- Columns 1–3: grouped for mobile stacking -->
        <div class="panel-group">

            <!-- Column 1: file list -->
            <div class="panel panel-files">
                <div class="panel-head">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                    </svg>
                    日期檔案
                </div>
                <div class="panel-body" id="file-list">
                    <div class="panel-empty"><span class="loading-dots">載入中</span></div>
                </div>
            </div>

            <!-- Column 2: type filter -->
            <div class="panel panel-filter">
                <div class="panel-head">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
                    </svg>
                    車種過濾
                </div>
                <div class="panel-body" id="type-filter">
                    <div class="panel-empty">—</div>
                </div>
            </div>

            <!-- Column 3: train list -->
            <div class="panel panel-trains">
                <div class="panel-head">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <rect x="4" y="4" width="16" height="16" rx="2" />
                        <path d="M4 12h16M12 4v16" />
                    </svg>
                    車次清單
                </div>
                <div class="panel-body" id="train-list">
                    <div class="panel-empty">請先選擇日期</div>
                </div>
            </div>

        </div><!-- /.panel-group -->

        <!-- Column 4: detail -->
        <div class="panel-detail">
            <div class="detail-scroll" id="detail-scroll">
                <div class="placeholder" id="placeholder">
                    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.2">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <path d="M3 9h18M9 21V9" />
                    </svg>
                    <p>選擇左側日期 → 車次以顯示詳情</p>
                </div>
                <div id="detail" style="display:none;"></div>
            </div>
        </div>

    </div>

    <!-- ── Templates ── -->

    <template id="tpl-filter-item">
        <div class="filter-item">
            <span class="f-name"></span>
            <span class="f-count"></span>
        </div>
    </template>

    <template id="tpl-train-item">
        <div class="train-item">
            <span class="t-num"></span>
            <span class="t-meta"></span>
        </div>
    </template>

    <template id="tpl-detail-card">
        <div class="detail-card">
            <div class="card-header">
                <span class="train-id">車次 <span class="train-num"></span></span>
                <span class="type-badge"></span>
            </div>
            <table class="info-table">
                <tbody></tbody>
            </table>
        </div>
    </template>

    <template id="tpl-info-row">
        <tr>
            <td class="info-key"></td>
            <td class="info-val"></td>
        </tr>
    </template>

    <template id="tpl-time-section">
        <div class="time-section">
            <div class="section-title"></div>
            <div class="time-table-wrap">
                <table class="time-table">
                    <thead>
                        <tr>
                            <th>順序</th>
                            <th>車站名稱</th>
                            <th>到站</th>
                            <th>出發</th>
                            <th>路線</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </template>

    <template id="tpl-time-row">
        <tr>
            <td class="order"></td>
            <td class="station"></td>
            <td class="time arr"></td>
            <td class="time dep"></td>
            <td class="route"></td>
        </tr>
    </template>

    <script src="js/trains.js"></script>
</body>

</html>
