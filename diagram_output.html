    <meta name="keywords" content="台灣鐵路,運行圖,時刻表,列車,時間空間圖,TRA,train diagram">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://tradiagram.com/diagram_output.html" />
    <meta property="og:title" content="台灣鐵路/軌道運行圖" />
    <meta property="og:description" content="以時間空間圖呈現台灣鐵路各路線列車運行狀況，涵蓋西部幹線、東部幹線及各支線。" />

    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <!-- 在 diagram_output.js（defer）執行前設定 D3 渲染旗標 -->

</head>

<body>
    <div id="popup" class="popup">
        <div class="msg">
            <h1>讀取中，請稍後<span id="loading-dots">.</span></h1>
        </div>
    </div>
    <noscript>
        <div style="padding:2rem;font-family:sans-serif;max-width:800px;margin:auto;line-height:1.8">
            <h1>台灣鐵路/軌道運行圖</h1>
            <p>本頁面以 SVG 時間空間圖呈現台灣鐵路各路線的列車運行狀況，需要啟用 JavaScript 才能顯示互動式運行圖。</p>
            <h2>支援路線</h2>
            <ul>
                <li>西部幹線北段（基隆–竹南）</li>
                <li>西部幹線台中線（竹南–彰化，經苗栗）</li>
                <li>西部幹線海岸線（竹南–彰化，經大甲）</li>
                <li>西部幹線南段（彰化–高雄）</li>
                <li>屏東線（高雄–枋寮）</li>
                <li>南迴線（枋寮–台東）</li>
                <li>台東線（花蓮–台東）</li>
                <li>北迴線（蘇澳新–花蓮）</li>
                <li>宜蘭線（八堵–蘇澳）</li>
                <li>平溪深澳線（八斗子–菁桐）</li>
                <li>內灣線（新竹–內灣）</li>
                <li>六家線（新竹–六家）</li>
                <li>集集線（二水–車埕）</li>
                <li>沙崙線（中洲–沙崙）</li>
            </ul>
            <p>資料來源：政府資料開放平臺台鐵時刻表</p>
        </div>
    </noscript>
</body>

<script src="js/diagram_output.js" defer></script>

</html>
